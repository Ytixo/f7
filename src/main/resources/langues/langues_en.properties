parametre.controleur.regle.title = Rules
parametre.controleur.regle.headerText = Game Rules
parametre.controleur.regle.texteRegle = Goal of the game\n\n\
Accumulate as many points as possible and be the first player to reach 200 points.\n\n\
Numbered cards\n\n\
Numbered cards score points equal to their value.\n\n\
When a player receives a card whose number is already among their cards for the round, they are eliminated from the round and score 0 points.\n\n\
Flip 7\n\n\
If a player gets 7 different numbered cards without any duplicates, they achieve a Flip 7 and receive a 15-point bonus.\n\n\
Special cards\n\n\
Freeze\n\n\
The Freeze card forces the targeted player to stop immediately. They keep the points accumulated during the round and can no longer receive new cards.\n\n\
Flip Three\n\n\
The Flip Three card forces the targeted player to immediately draw 3 extra cards. Each card is resolved normally and can therefore earn them points or cause a duplicate.\n\n\
Second Chance\n\n\
The Second Chance card protects a player against a duplicate. If this player reveals a card whose number they already have, the Second Chance card is consumed and the duplicate is ignored. The player therefore stays in the round.\n\n\
Bonus cards\n\n\
Bonus cards add points to the round score of the player who has them.\n\n\
+2: adds 2 points.\n\
+4: adds 4 points.\n\
+6: adds 6 points.\n\
+8: adds 8 points.\n\
+10: adds 10 points.\n\n\
Bonuses are taken into account when calculating the round score.\n\n\
End of the game\n\n\
The game ends when a player reaches or exceeds 200 points. The player with the highest total score wins the game.

