parametre.controleur.regle.title = Crédits
parametre.controleur.regle.headerText = Règle du Jeu
parametre.controleur.regle.texteRegle = But du jeu\n\n\
Accumuler le plus de points possible et être le premier joueur à atteindre 200 points.\n\n\
Cartes numérotées\n\n\
Les cartes numérotées rapportent un nombre de points égal à leur valeur.\n\n\
Lorsqu'un joueur reçoit une carte dont le numéro est déjà présent parmi ses cartes de la manche, il est éliminé de la manche et marque 0 point.\n\n\
Flip 7\n\n\
Si un joueur obtient 7 cartes numérotées différentes sans aucun doublon, il réalise un Flip 7 et reçoit un bonus de 15 points.\n\n\
Cartes spéciales\n\n\
Freeze\n\n\
La carte Freeze force le joueur ciblé à s'arrêter immédiatement. Il conserve les points accumulés pendant la manche et ne peut plus recevoir de nouvelles cartes.\n\n\
Flip Three\n\n\
La carte Flip Three oblige le joueur ciblé à recevoir immédiatement 3 cartes supplémentaires. Chaque carte est résolue normalement et peut donc lui faire gagner des points ou provoquer un doublon.\n\n\
Second Chance\n\n\
La carte Second Chance protège un joueur contre un doublon. Si ce joueur révèle une carte dont il possède déjà le numéro, la carte Second Chance est consommée et le doublon est ignoré. Le joueur reste donc dans la manche.\n\n\
Cartes bonus\n\n\
Les cartes bonus ajoutent des points au score de la manche du joueur qui les possède.\n\n\
+2 : ajoute 2 points.\n\
+4 : ajoute 4 points.\n\
+6 : ajoute 6 points.\n\
+8 : ajoute 8 points.\n\
+10 : ajoute 10 points.\n\n\
Les bonus sont pris en compte lors du calcul du score de la manche.\n\n\
Fin de partie\n\n\
La partie se termine lorsqu'un joueur atteint ou dépasse 200 points. Le joueur ayant le score total le plus élevé remporte la partie.

